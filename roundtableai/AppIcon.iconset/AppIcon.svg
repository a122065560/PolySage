<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 中心渐变 -->
    <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66CCFF" />
      <stop offset="100%" stop-color="#FFB6C1" />
    </radialGradient>
  </defs>

  <!-- 整体缩放至画布的 82%，留出 9% 的安全边距，与 Chrome 等主流 macOS 图标大小一致 -->
  <g transform="translate(92, 92) scale(0.82)">
    <!-- 纯白圆角矩形背景 -->
    <rect width="1024" height="1024" rx="230" fill="#FFFFFF" />
    <!-- 中心渐变圆，直径 696px，占内容宽度的 68% -->
    <circle cx="512" cy="512" r="348" fill="url(#centerGradient)" />
  </g>
</svg>
