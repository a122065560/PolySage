# ============================================================
# PolySage（聚慧）多平台发布构建工作流
# ------------------------------------------------------------
# 触发方式：
#   1. 手动触发 (workflow_dispatch) —— 输入版本号
#   2. 推送 v* 标签自动触发
# 构建平台：macOS (ARM64) + Windows (x64)
# 产物：聚慧-{version}-arm64.dmg / 聚慧-{version}-Windows.exe
# ============================================================
name: 发布构建

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  # ============================================================
  # macOS 构建任务 (ARM64)
  # 使用 build_dmg.sh 完整构建流程（含 Qt6 符号链接等关键步骤）
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pyinstaller==6.3.0

      # macOS: Chromium 由 build_dmg.sh 下载到临时目录，PyInstaller 后再复制（避免 Mach-O 处理失败）
      - name: 构建 macOS .app + .dmg（build_dmg.sh）
        working-directory: app
        env:
          GITHUB_ACTIONS: 'true'
          DMG_NAME: PolySage-${{ env.VERSION }}-arm64.dmg
        run: bash build_dmg.sh

      - name: 上传 macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/PolySage-${{ env.VERSION }}-arm64.dmg
          retention-days: 30

  # ============================================================
  # Windows 构建任务 (x64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    env:
      CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pyinstaller==6.3.0

      - name: 安装 Playwright Chromium（下载到包目录，供 PyInstaller 打包）
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"

      - name: PyInstaller 打包
        working-directory: app
        run: pyinstaller --noconfirm PolySage.spec

      - name: 配置 Inno Setup
        run: echo "C:\Program Files (x86)\Inno Setup 6" >> $GITHUB_PATH

      - name: 生成 Windows 安装包
        run: iscc /DMyAppVersion=${{ env.VERSION }} common/installer.iss

      - name: 移动到根目录
        shell: bash
        run: |
          mv "common/PolySage-${{ env.VERSION }}-Windows.exe" .
          ls -la "PolySage-${{ env.VERSION }}-Windows.exe"

      - name: 代码签名
        if: ${{ env.CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /f cert.pfx /p $env:CERT_PASSWORD `
            /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
            "PolySage-${{ env.VERSION }}-Windows.exe"

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: PolySage-${{ env.VERSION }}-Windows.exe
          retention-days: 30

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物文件
        run: find artifacts -type f

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: 聚慧 PolySage ${{ env.VERSION }} 正式版
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-exe/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
